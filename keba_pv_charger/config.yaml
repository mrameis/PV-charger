name: "Keba/go-eCharger PV-Überschussladen"
version: "3.0.1"
slug: "keba_pv_charger"
description: "Regelt eine Keba KeContact oder go-eCharger Wallbox per PV-Überschuss, komplett im Interface konfigurierbar"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8080
# Aktiviert, um ein Docker-Bridge/UDP-NAT-Problem zu umgehen: der Container nutzt
# damit das Netzwerk des Host-Systems direkt statt der isolierten Docker-Bridge.
# Ingress funktioniert damit weiterhin normal (viele offizielle HA-Add-ons wie
# Node-RED oder Mosquitto nutzen dasselbe Muster).
host_network: true
panel_icon: mdi:car-electric-outline
panel_title: PV-Laden
map:
  - "data:rw"
options:
  log_level: "info"
schema:
  log_level: list(debug|info|warn|error)
